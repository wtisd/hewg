# GitHub Project Configuration
# Generated by: deno task setup:actions
#
# This file configures the Issue-to-Project GitHub Actions workflow.
# Edit the values below to match your project settings.

[project]
# Your GitHub Project URL (required)
# Format: https://github.com/users/{username}/projects/{number}
#     or: https://github.com/orgs/{org}/projects/{number}
url = "https://github.com/users/wtisd/projects/1"

[defaults]
# Default field values for new issues (all optional)
# Uncomment and modify the fields you want to set automatically

# Status: Planned | Ready | In Progress | In Review | Done
status = "Planned"

# Priority: P0 | P1 | P2
# priority = "P1"

# Iteration/Sprint name (must match an existing iteration in your project)
# iteration = "Sprint 1"

# Size estimate (numeric value)
# size = 3

# Time estimate in hours (numeric value)
# estimate = 8

# Start date (YYYY-MM-DD format)
# start_date = "2026-01-05"

# Target date (YYYY-MM-DD format)
# target_date = "2026-01-12"

[pr]
# Pull Request Status Update Configuration
# These settings control the pr-status-update workflow

# Status to set when a PR is opened or reopened
# Must match an existing status option in your project
review_status = "In Review"

# Branch name pattern for extracting Issue numbers (regex)
# Default pattern matches: label/author/{issue_number}/title
# The first capture group should contain the Issue number
branch_pattern = "^[^/]+/[^/]+/(\\d+)/.*$"

# Whether to ignore Draft PRs
# true = skip draft PRs, false = process draft PRs too
ignore_draft = false

[tag]
# Auto Tag Configuration
# These settings control the auto-tag workflow for semantic versioning

# Labels that trigger MAJOR version increment (X.0.0)
# Use for breaking changes or major releases
major_labels = ["release"]

# Labels that trigger MINOR version increment (0.X.0)
# Use for new features that are backward compatible
minor_labels = ["feature"]

# Labels that trigger PATCH version increment (0.0.X)
# Use for bug fixes and small improvements
patch_labels = ["bugfix", "fix", "patch", "hotfix"]

# All other labels (e.g., refactor, docs, chore) will only increment
# the RC counter when merged to develop, and default to PATCH when
# merged directly to main.
