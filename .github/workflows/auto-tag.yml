# Automatic Tag Creation on PR Merge
# Generated by: deno task setup:actions
#
# This workflow automatically creates semantic version tags when PRs are merged.
# It calls the hewg CLI to calculate and create tags.
#
# Version increments are determined by the branch label (first segment of branch name).
# Branch naming convention: {label}/{author}/{issue_number}/{title}
#
# Required setup:
# 1. Configure .github/project.toml with [tag] section
# 2. Ensure workflow has contents: write permission

name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run auto-tag command
        id: auto-tag
        run: |
          # Run hewg auto-tag command with JSON output
          # Capture both stdout and exit code, stderr goes to workflow log
          set +e  # Temporarily disable exit on error
          result=$(deno run --allow-read --allow-env --allow-run src/main.ts auto-tag \
            --source-branch "${{ github.head_ref }}" \
            --target-branch "${{ github.base_ref }}" \
            --config ".github/project.toml" \
            --json 2>&1)
          exit_code=$?
          set -e  # Re-enable exit on error

          echo "::group::CLI Output"
          echo "$result"
          echo "::endgroup::"

          # Check if command succeeded
          if [ $exit_code -ne 0 ]; then
            echo "::error::CLI exited with code $exit_code"
            echo "result=$result" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Validate JSON before parsing
          if ! echo "$result" | jq -e . > /dev/null 2>&1; then
            echo "::error::Invalid JSON output from CLI"
            echo "Raw output: $result"
            exit 1
          fi

          echo "result=$result" >> $GITHUB_OUTPUT

          # Parse result safely with defaults
          success=$(echo "$result" | jq -r '.success // "false"')
          if [ "$success" != "true" ]; then
            error=$(echo "$result" | jq -r '.error // "Unknown error"')
            context=$(echo "$result" | jq -r '.context // empty')
            echo "::error::Auto-tag failed: $error"
            if [ -n "$context" ]; then
              echo "Context: $context"
            fi
            exit 1
          fi

          # Extract values for comment
          echo "new_tag=$(echo "$result" | jq -r '.newTag')" >> $GITHUB_OUTPUT
          echo "current_tag=$(echo "$result" | jq -r '.currentTag // "v0.0.0"')" >> $GITHUB_OUTPUT
          echo "label=$(echo "$result" | jq -r '.label')" >> $GITHUB_OUTPUT
          echo "increment_type=$(echo "$result" | jq -r '.incrementType')" >> $GITHUB_OUTPUT
          echo "is_develop_to_main=$(echo "$result" | jq -r '.isDevelopToMain')" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const newTag = '${{ steps.auto-tag.outputs.new_tag }}';
            const currentTag = '${{ steps.auto-tag.outputs.current_tag }}';
            const label = '${{ steps.auto-tag.outputs.label }}';
            const incrementType = '${{ steps.auto-tag.outputs.increment_type }}';
            const isDevelopToMain = '${{ steps.auto-tag.outputs.is_develop_to_main }}' === 'true';
            const targetBranch = '${{ github.base_ref }}';

            let body = [
              `🏷️ **Tag Created**: \`${newTag}\``,
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| Previous | \`${currentTag}\` |`,
              `| Label | \`${label}\` |`,
              `| Increment | ${incrementType} |`,
              `| Target | \`${targetBranch}\` |`,
            ];

            if (isDevelopToMain) {
              body.push('');
              body.push('> This is a release from develop branch (RC suffix removed)');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body.join('\n')
            });

      - name: Handle failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '⚠️ **Tag Creation Failed**',
                '',
                'The auto-tag workflow encountered an error.',
                '',
                `[View workflow run](${runUrl})`
              ].join('\n')
            });
