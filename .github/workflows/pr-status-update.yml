# Update Issue Status on Pull Request
# Generated by: deno task setup:actions
#
# This workflow automatically updates linked Issue statuses to "In Review"
# when a Pull Request is opened or reopened.
#
# Issue numbers are extracted from:
# 1. Branch name: label/author/{issue_number}/title
# 2. PR body keywords: Closes #N, Fixes #N, Resolves #N
#
# Required setup:
# 1. Create a Personal Access Token (PAT) with 'project' scope
# 2. Add it as a repository secret named 'PROJECT_TOKEN'
# 3. Configure .github/project.toml with your project URL and [pr] settings

name: Update Issue Status on PR

on:
  pull_request:
    types: [opened, reopened]

jobs:
  update-status:
    name: Update Issue Status
    runs-on: ubuntu-latest
    environment: project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run pr-status command
        id: pr-status
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          # Run hewg pr-status command with JSON output
          # stdout = JSON result, stderr = Deno messages (displayed in workflow log)
          set +e  # Temporarily disable exit on error

          # Build command arguments
          draft_flag=""
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            draft_flag="--draft"
          fi

          # Use heredoc for body to handle special characters
          body_content='${{ github.event.pull_request.body }}'

          result=$(deno run --allow-read --allow-env --allow-net src/main.ts pr-status \
            --pr-number "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --branch "${{ github.head_ref }}" \
            --body "$body_content" \
            $draft_flag \
            --config ".github/project.toml" \
            --json)
          exit_code=$?
          set -e  # Re-enable exit on error

          echo "::group::CLI Output"
          echo "$result"
          echo "::endgroup::"

          # Check if command succeeded
          if [ $exit_code -ne 0 ]; then
            echo "::error::CLI exited with code $exit_code"
            echo "result=$result" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Validate JSON before parsing
          if ! echo "$result" | jq -e . > /dev/null 2>&1; then
            echo "::error::Invalid JSON output from CLI"
            echo "Raw output: $result"
            exit 1
          fi

          echo "result=$result" >> $GITHUB_OUTPUT

          # Parse result safely with defaults
          success=$(echo "$result" | jq -r '.success // "false"')
          skipped_draft=$(echo "$result" | jq -r '.skippedDraft // "false"')

          # Handle skipped draft case
          if [ "$skipped_draft" = "true" ]; then
            echo "::notice::Skipped draft PR (ignore_draft is enabled)"
            exit 0
          fi

          if [ "$success" != "true" ]; then
            error=$(echo "$result" | jq -r '.error // "Unknown error"')
            context=$(echo "$result" | jq -r '.context // empty')
            echo "::error::PR-status failed: $error"
            if [ -n "$context" ]; then
              echo "Context: $context"
            fi
            exit 1
          fi

          # Extract values for logging/comment
          echo "processed_issues=$(echo "$result" | jq -r '.processedIssues // [] | map("#" + tostring) | join(", ")')" >> $GITHUB_OUTPUT
          echo "failed_issues=$(echo "$result" | jq -r '.failedIssues // [] | map("#" + tostring) | join(", ")')" >> $GITHUB_OUTPUT
          echo "skipped_issues=$(echo "$result" | jq -r '.skippedIssues // [] | map("#" + tostring) | join(", ")')" >> $GITHUB_OUTPUT
          echo "new_status=$(echo "$result" | jq -r '.newStatus // ""')" >> $GITHUB_OUTPUT
          echo "processed_count=$(echo "$result" | jq -r '.processedIssues | length')" >> $GITHUB_OUTPUT
          echo "failed_count=$(echo "$result" | jq -r '.failedIssues | length')" >> $GITHUB_OUTPUT
          echo "skipped_count=$(echo "$result" | jq -r '.skippedIssues | length')" >> $GITHUB_OUTPUT
          echo "issue_source=$(echo "$result" | jq -c '.issueSource // {}')" >> $GITHUB_OUTPUT

      - name: Log success
        if: steps.pr-status.outputs.processed_count != '0'
        run: |
          echo "✓ Updated status to '${{ steps.pr-status.outputs.new_status }}' for issues: ${{ steps.pr-status.outputs.processed_issues }}"
          if [ -n "${{ steps.pr-status.outputs.skipped_issues }}" ]; then
            echo "⚠ Skipped (not found): ${{ steps.pr-status.outputs.skipped_issues }}"
          fi
          if [ -n "${{ steps.pr-status.outputs.failed_issues }}" ]; then
            echo "✗ Failed to update: ${{ steps.pr-status.outputs.failed_issues }}"
          fi

      - name: Comment on PR (no issues found)
        if: steps.pr-status.outputs.processed_count == '0' && steps.pr-status.outputs.failed_count == '0' && steps.pr-status.outputs.skipped_count == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ github.head_ref }}';
            const prBody = `${{ github.event.pull_request.body }}`;
            const hasBody = prBody && prBody.trim().length > 0;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                ':information_source: **No linked Issues found**',
                '',
                'Could not find Issue numbers in:',
                `- Branch name: \`${branchName}\``,
                `- PR body keywords: ${hasBody ? '(none matching)' : '(empty)'}`,
                '',
                '**Expected formats**:',
                '- Branch: `label/author/{issue_number}/title`',
                '- Keywords: `Closes #N`, `Fixes #N`, `Resolves #N`'
              ].join('\n')
            });

      - name: Warn if all issues skipped
        if: steps.pr-status.outputs.processed_count == '0' && steps.pr-status.outputs.skipped_count != '0'
        run: |
          echo "::warning::All extracted issues were skipped (not found in repository)"

      - name: Comment on PR (issues skipped)
        if: steps.pr-status.outputs.skipped_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ github.head_ref }}';
            const processed = '${{ steps.pr-status.outputs.processed_issues }}';
            const skipped = '${{ steps.pr-status.outputs.skipped_issues }}';
            const newStatus = '${{ steps.pr-status.outputs.new_status }}';
            const issueSource = JSON.parse('${{ steps.pr-status.outputs.issue_source }}' || '{}');

            // Build skipped issues with source info
            const skippedList = skipped.split(', ').filter(Boolean).map(issue => {
              const num = issue.replace('#', '');
              const source = issueSource[num] || 'unknown';
              return `${issue} (not found - extracted from ${source})`;
            });

            const bodyLines = [':clipboard: **PR Status Update**', ''];

            if (processed) {
              bodyLines.push(`**:white_check_mark: Updated:** ${processed} → ${newStatus}`);
            }

            if (skippedList.length > 0) {
              bodyLines.push(`**:warning: Skipped:**`);
              skippedList.forEach(item => bodyLines.push(`- ${item}`));
            }

            bodyLines.push('', `**Source branch:** \`${branchName}\``);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: bodyLines.join('\n')
            });

      - name: Handle partial failure
        if: steps.pr-status.outputs.failed_count != '0' && steps.pr-status.outputs.processed_count != '0'
        uses: actions/github-script@v7
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const processed = '${{ steps.pr-status.outputs.processed_issues }}';
            const failed = '${{ steps.pr-status.outputs.failed_issues }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                ':warning: **Partial success updating Issue status**',
                '',
                `**Successfully updated**: ${processed}`,
                `**Failed**: ${failed}`,
                '',
                `[View workflow run](${runUrl})`
              ].join('\n')
            });

      - name: Handle failure
        if: failure()
        uses: actions/github-script@v7
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                ':warning: **Failed to update Issue status**',
                '',
                '**Troubleshooting**:',
                '- Ensure `PROJECT_TOKEN` secret is configured with `project` scope',
                '- Verify the project URL in `.github/project.toml`',
                '- Check that the status option exists in your project',
                '',
                `[View workflow run](${runUrl})`
              ].join('\n')
            });
