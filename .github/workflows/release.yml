name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: hewg-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            output: hewg-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            output: hewg-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            output: hewg-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: hewg-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        run: deno compile --allow-read --allow-env --allow-net --target ${{ matrix.target }} --output dist/${{ matrix.output }} src/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
