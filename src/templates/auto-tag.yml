# Automatic Tag Creation on PR Merge
# Generated by: deno task setup:actions
#
# This workflow automatically creates semantic version tags when PRs are merged.
# Version increments are determined by the branch label (first segment of branch name).
#
# Branch naming convention: {label}/{author}/{issue_number}/{title}
# Example: feature/wtisd/8/auto-tag-workflow -> label = "feature"
#
# Version rules:
# - develop branch: Creates RC versions (v1.2.0-rc.0)
# - main branch: Creates release versions (v1.2.0)
# - develop -> main merge: Strips RC suffix
#
# Required setup:
# 1. Configure .github/project.toml with [tag] section
# 2. Ensure workflow has contents: write permission

name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create Tag
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // ============================================================
            // TOML Parser (reused from pr-status-update.yml)
            // ============================================================
            function parseToml(content) {
              const result = { project: {}, defaults: {}, pr: {}, tag: {} };
              let currentSection = null;

              for (const line of content.split('\n')) {
                const trimmed = line.trim();

                // Skip empty lines and comments
                if (!trimmed || trimmed.startsWith('#')) continue;

                // Section header
                const sectionMatch = trimmed.match(/^\[(\w+)\]$/);
                if (sectionMatch) {
                  currentSection = sectionMatch[1];
                  if (!result[currentSection]) result[currentSection] = {};
                  continue;
                }

                // Key-value pair
                const kvMatch = trimmed.match(/^(\w+)\s*=\s*(.+)$/);
                if (kvMatch && currentSection) {
                  let value = kvMatch[2].trim();
                  // Remove quotes from strings
                  if ((value.startsWith('"') && value.endsWith('"')) ||
                      (value.startsWith("'") && value.endsWith("'"))) {
                    value = value.slice(1, -1);
                  }
                  // Parse arrays
                  else if (value.startsWith('[') && value.endsWith(']')) {
                    try {
                      value = JSON.parse(value.replace(/'/g, '"'));
                    } catch (e) {
                      // If JSON parse fails, try manual parsing
                      value = value.slice(1, -1).split(',').map(s =>
                        s.trim().replace(/^["']|["']$/g, '')
                      ).filter(s => s);
                    }
                  }
                  // Parse booleans
                  else if (value === 'true') {
                    value = true;
                  }
                  else if (value === 'false') {
                    value = false;
                  }
                  // Parse numbers
                  else if (/^\d+$/.test(value)) {
                    value = parseInt(value, 10);
                  }
                  else if (/^\d+\.\d+$/.test(value)) {
                    value = parseFloat(value);
                  }
                  result[currentSection][kvMatch[1]] = value;
                }
              }

              return result;
            }

            // ============================================================
            // Version Parsing and Calculation
            // ============================================================

            /**
             * Parse a version tag into components
             * @param {string} tag - Version tag (e.g., "v1.2.3-rc.4" or "v1.2.3")
             * @returns {{ major: number, minor: number, patch: number, rc: number | null }}
             */
            function parseVersion(tag) {
              if (!tag) {
                return { major: 0, minor: 0, patch: 0, rc: null };
              }

              // Remove 'v' prefix if present
              const version = tag.startsWith('v') ? tag.slice(1) : tag;

              // Match version pattern: MAJOR.MINOR.PATCH[-rc.N]
              const match = version.match(/^(\d+)\.(\d+)\.(\d+)(?:-rc\.(\d+))?$/);
              if (!match) {
                console.log(`Warning: Invalid version format: ${tag}, using v0.0.0`);
                return { major: 0, minor: 0, patch: 0, rc: null };
              }

              return {
                major: parseInt(match[1], 10),
                minor: parseInt(match[2], 10),
                patch: parseInt(match[3], 10),
                rc: match[4] !== undefined ? parseInt(match[4], 10) : null
              };
            }

            /**
             * Get the increment type based on branch label
             * @param {string} label - Branch label
             * @param {object} config - Tag configuration
             * @returns {'MAJOR' | 'MINOR' | 'PATCH' | 'RC_ONLY'}
             */
            function getIncrementType(label, config) {
              const majorLabels = config.major_labels || ['release'];
              const minorLabels = config.minor_labels || ['feature'];
              const patchLabels = config.patch_labels || ['bugfix', 'fix', 'patch', 'hotfix'];

              if (majorLabels.includes(label)) return 'MAJOR';
              if (minorLabels.includes(label)) return 'MINOR';
              if (patchLabels.includes(label)) return 'PATCH';
              return 'RC_ONLY';
            }

            /**
             * Extract label from branch name
             * @param {string} branchName - Full branch name
             * @returns {string} - First segment (label)
             */
            function extractLabel(branchName) {
              const segments = branchName.split('/');
              return segments[0] || '';
            }

            /**
             * Calculate new version based on current version, increment type, and target branch
             * @param {object} current - Current version components
             * @param {string} incrementType - MAJOR, MINOR, PATCH, or RC_ONLY
             * @param {string} targetBranch - Target branch (main or develop)
             * @param {boolean} isDevelopToMain - Whether this is a develop->main merge
             * @returns {string} - New version tag
             */
            function calculateNewVersion(current, incrementType, targetBranch, isDevelopToMain) {
              // Special case: develop -> main merge
              if (isDevelopToMain) {
                // Strip RC suffix, keep version numbers
                return `v${current.major}.${current.minor}.${current.patch}`;
              }

              const isRC = targetBranch === 'develop';

              if (isRC) {
                // RC version for develop branch
                if (incrementType === 'MAJOR') {
                  return `v${current.major + 1}.0.0-rc.0`;
                } else if (incrementType === 'MINOR') {
                  return `v${current.major}.${current.minor + 1}.0-rc.0`;
                } else if (incrementType === 'PATCH') {
                  return `v${current.major}.${current.minor}.${current.patch + 1}-rc.0`;
                } else {
                  // RC_ONLY - just increment RC counter
                  const rcNum = (current.rc ?? -1) + 1;
                  return `v${current.major}.${current.minor}.${current.patch}-rc.${rcNum}`;
                }
              } else {
                // Release version for main branch
                if (incrementType === 'MAJOR') {
                  return `v${current.major + 1}.0.0`;
                } else if (incrementType === 'MINOR') {
                  return `v${current.major}.${current.minor + 1}.0`;
                } else {
                  // PATCH or RC_ONLY defaults to PATCH for main
                  return `v${current.major}.${current.minor}.${current.patch + 1}`;
                }
              }
            }

            /**
             * Get the latest git tag
             * @returns {string | null}
             */
            function getLatestTag() {
              try {
                const tag = execSync('git describe --tags --abbrev=0 2>/dev/null', { encoding: 'utf8' }).trim();
                return tag || null;
              } catch (e) {
                return null;
              }
            }

            /**
             * Create and push a new tag
             * @param {string} tag - Tag name
             * @param {string} message - Tag message
             */
            function createTag(tag, message) {
              execSync(`git tag -a "${tag}" -m "${message}"`, { encoding: 'utf8' });
              execSync(`git push origin "${tag}"`, { encoding: 'utf8' });
            }

            // ============================================================
            // Main Execution
            // ============================================================

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const pr = context.payload.pull_request;
            const targetBranch = pr.base.ref;
            const sourceBranch = pr.head.ref;

            console.log(`PR #${pr.number}: ${sourceBranch} -> ${targetBranch}`);

            try {
              // Read configuration
              const configPath = '.github/project.toml';
              let tagConfig = {
                major_labels: ['release'],
                minor_labels: ['feature'],
                patch_labels: ['bugfix', 'fix', 'patch', 'hotfix']
              };

              if (fs.existsSync(configPath)) {
                const configContent = fs.readFileSync(configPath, 'utf8');
                const config = parseToml(configContent);
                if (config.tag) {
                  tagConfig = { ...tagConfig, ...config.tag };
                }
                console.log('Loaded tag configuration from project.toml');
              } else {
                console.log('No project.toml found, using default configuration');
              }

              // Get latest tag
              const latestTag = getLatestTag();
              console.log(`Latest tag: ${latestTag || '(none, starting from v0.0.0)'}`);

              // Parse current version
              const currentVersion = parseVersion(latestTag);
              console.log(`Current version: ${JSON.stringify(currentVersion)}`);

              // Check if this is a develop -> main merge
              const isDevelopToMain = targetBranch === 'main' && sourceBranch === 'develop';
              console.log(`Is develop->main merge: ${isDevelopToMain}`);

              // Extract label from source branch
              const label = extractLabel(sourceBranch);
              console.log(`Branch label: ${label}`);

              // Get increment type
              const incrementType = getIncrementType(label, tagConfig);
              console.log(`Increment type: ${incrementType}`);

              // Calculate new version
              const newTag = calculateNewVersion(currentVersion, incrementType, targetBranch, isDevelopToMain);
              console.log(`New tag: ${newTag}`);

              // Create tag message
              const tagMessage = `Release ${newTag}\n\nPR: #${pr.number}\nBranch: ${sourceBranch}\nLabel: ${label}\nIncrement: ${incrementType}`;

              // Create and push tag
              createTag(newTag, tagMessage);
              console.log(`Successfully created and pushed tag: ${newTag}`);

              // Comment on PR
              const commentBody = [
                `🏷️ **Tag Created**: \`${newTag}\``,
                '',
                `| Field | Value |`,
                `|-------|-------|`,
                `| Previous | \`${latestTag || 'v0.0.0'}\` |`,
                `| Label | \`${label}\` |`,
                `| Increment | ${incrementType} |`,
                `| Target | \`${targetBranch}\` |`,
                '',
                isDevelopToMain ? '> This is a release from develop branch (RC suffix removed)' : '',
              ].filter(Boolean).join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: commentBody
              });

              console.log('Posted comment on PR');

            } catch (error) {
              console.error(`Error: ${error.message}`);

              // Comment error on PR
              const errorBody = [
                `⚠️ **Tag Creation Failed**`,
                '',
                `**Error**: ${error.message}`,
                '',
                `[View workflow run](${runUrl})`
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: errorBody
              });

              core.setFailed(error.message);
            }
